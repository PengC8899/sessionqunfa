services:
  web:
    build: .
    container_name: tg-local-web
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=debug
      - SESSION_DIR=/sessions
      - DB_URL=sqlite:////app/data/data.db
    volumes:
      - ./sessions:/sessions
      - ./data:/app/data
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
    restart: unless-stopped
